name: docs-drift

on:
  pull_request:
  push:
    branches: [main]

jobs:
  drift-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/admin/pnpm-lock.yaml
      - name: Install (admin)
        run: pnpm install --no-frozen-lockfile
      # Drift check (frontend mode): every src/lib/components/**/*.svelte must
      # have a sibling *.stories.svelte.
      - name: Verify sibling stories
        shell: bash
        run: |
          set -e
          missing=0
          while IFS= read -r f; do
            base="${f%.svelte}"
            # Skip files that already are stories
            case "$f" in *.stories.svelte) continue ;; esac
            # Skip nested helper components (e.g. Toast/icons/*) — only enforce
            # at the top-most Component.svelte per folder when present.
            if [ ! -f "${base}.stories.svelte" ]; then
              echo "::warning file=apps/admin/${f}::missing sibling ${base}.stories.svelte"
              missing=$((missing+1))
            fi
          done < <(find src/lib/components -name '*.svelte' -not -name '*.stories.svelte')
          echo "Missing stories: $missing"
          # NOTE: initial migration ships ONE story (Avatar). Drift check is
          # informational (warning-only) until backfill is complete. Flip to
          # `exit 1` here when all components have sibling stories.
      - name: Build Storybook (smoke)
        run: pnpm storybook:build
